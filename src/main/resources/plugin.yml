name: WorldHeightLimit
version: ${version}
main: ru.sorfin.worldheightlimit.WorldHeightLimitPlugin
api-version: '1.20'
folia-supported: true
description: Raises the world height limit on Bukkit, Spigot, Paper, Purpur, and Folia 1.20.5-1.21.11 with configurable admin-only access.
author: SORFIN
commands:
  worldheightlimit:
    description: Admin command for World Height Limit.
    usage: /<command> <reload|status|debug|worlds|fill|platform|help>
    aliases:
      - highbuildlimit
permissions:
  highbuildlimit.bypass:
    description: Allows building above the normal vanilla height limit.
    default: op
  highbuildlimit.reload:
    description: Allows reloading WorldHeightLimit config.
    default: op
  highbuildlimit.status:
    description: Allows viewing WorldHeightLimit status.
    default: op
  highbuildlimit.fill:
    description: Allows using WorldHeightLimit fill and platform commands.
    default: op
